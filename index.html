<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Dating Invite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* === CSS Reset === */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* === CSS Variables === */
:root {
  --pink: #FF6B8A;
  --coral: #FF8C69;
  --cream: #FFF5F0;
  --purple: #E8D5F5;
  --text: #4A4A4A;
  --white: #FFFFFF;
  --shadow: 0 4px 20px rgba(255, 107, 138, 0.2);
  --radius: 20px;
  --font: 'Nunito', -apple-system-rounded, 'Segoe UI', system-ui, sans-serif;
}

/* === Base Styles === */
html, body {
  width: 100%;
  height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: var(--cream);
  min-height: 100vh;
  min-height: 100dvh;
  font-family: var(--font);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(circle at 20% 80%, rgba(255,107,138,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(232,213,245,0.08) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,140,105,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* === App Container === */
.app-container {
  width: 100%;
  max-width: 375px;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 1;
}

/* === Step Containers === */
.step {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  text-align: center;
  animation: fadeSlideIn 0.4s ease;
}

.step.active {
  display: flex;
}

/* === Step Typography === */
.step-title {
  font-size: 1.8rem;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
}

.step-subtitle {
  font-size: 1rem;
  color: var(--coral);
}

.step-emoji {
  font-size: 5rem;
  line-height: 1;
  animation: heartbeat 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(255,107,138,0.2));
}
.step-emoji.float-anim { animation: float 3s ease-in-out infinite; }
.step-emoji.wobble-anim { animation: wobble 2.5s ease-in-out infinite; }
.step-emoji.heartbeat-anim { animation: heartbeat 2s ease-in-out infinite; }

/* === STEP CUTE GIF === */
.step-gif {
  width: 140px;
  height: 140px;
  object-fit: contain;
  border-radius: 24px;
  background: var(--cream);
  padding: 8px;
  mix-blend-mode: multiply;
  filter: drop-shadow(0 4px 16px rgba(255,107,138,0.15));
}
.step-gif.float-anim { animation: float 3s ease-in-out infinite; }
.step-gif.wobble-anim { animation: wobble 2.5s ease-in-out infinite; }
.step-gif.heartbeat-anim { animation: heartbeat 2s ease-in-out infinite; }

/* === Buttons === */
.btn {
  border: none;
  border-radius: 50px;
  padding: 14px 36px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.btn:active {
  transform: scale(0.95);
}

.btn-yes {
  background-color: var(--pink);
  color: var(--white);
  box-shadow: var(--shadow);
}

.btn-no {
  background-color: var(--white);
  color: var(--coral);
  border: 2px dashed var(--coral);
  position: relative;
  will-change: left, top;
}

.btn-next {
  background-color: var(--pink);
  color: var(--white);
  box-shadow: var(--shadow);
}

/* === Hint Text === */
.hint-text {
  font-size: 0.85rem;
  color: var(--coral);
  opacity: 0.7;
}

/* === Hidden Utility === */
.hidden {
  display: none;
}

/* === Keyframe Animations === */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeSlideOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-20px); }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes wiggle {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-3deg); }
  75% { transform: rotate(3deg); }
}

@keyframes bounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  14% { transform: scale(1.15); }
  28% { transform: scale(1); }
  42% { transform: scale(1.1); }
  56% { transform: scale(1); }
}

@keyframes sparkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(10deg); }
}

@keyframes twinkle {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

@keyframes wobble {
  0%, 100% { transform: rotate(0deg) scale(1); }
  25% { transform: rotate(5deg) scale(1.08); }
  75% { transform: rotate(-5deg) scale(1.08); }
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

@keyframes sway {
  0%, 100% { margin-left: 0; }
  50% { margin-left: 15px; }
}

/* === FLOATING PARTICLES === */
.floating-particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.particle {
  position: absolute;
  bottom: -20px;
  font-size: 1.5rem;
  animation: floatUp linear infinite;
  opacity: 0.7;
}

/* === MUSIC TOGGLE === */
.music-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 300;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.music-toggle:active { transform: scale(0.9); }
.music-toggle.playing { box-shadow: 0 2px 16px rgba(255,107,138,0.3); }

/* === CALENDAR === */
.calendar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
.calendar-overlay.show { display: flex; }
.calendar-popup {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px;
  width: 320px;
  max-width: 90vw;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  animation: popIn 0.3s ease;
}
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.calendar-header button {
  background: none; border: none; font-size: 1.2rem; cursor: pointer;
  padding: 4px 8px; color: var(--text);
}
.calendar-month { font-weight: 700; font-size: 1.1rem; }
.calendar-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; font-size: 0.75rem; color: var(--coral);
  margin-bottom: 8px; font-weight: 600;
}
.calendar-days {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px; text-align: center;
}
.calendar-days button {
  width: 44px; height: 44px; border-radius: 50%;
  border: none; background: none;
  font-family: var(--font); font-size: 0.9rem; cursor: pointer;
  color: var(--text); transition: background 0.15s, color 0.15s;
}
.calendar-days button:hover { background: var(--purple); }
.calendar-days button.selected { background: var(--pink); color: var(--white); }
.calendar-days button.other-month { opacity: 0.3; }
.time-selector {
  display: flex; gap: 12px; margin-top: 16px;
  justify-content: center; align-items: center;
}
.time-selector select {
  padding: 8px 12px; border-radius: 10px;
  border: 2px solid var(--purple);
  font-family: var(--font); font-size: 1rem;
  background: var(--white); color: var(--text);
}
.calendar-confirm {
  display: block; margin: 16px auto 0;
  background: var(--pink); color: var(--white);
  border: none; border-radius: 50px;
  padding: 10px 30px;
  font-family: var(--font); font-size: 1rem; font-weight: 700;
  cursor: pointer;
}
.selected-datetime-display {
  color: var(--pink); font-weight: 600; font-size: 1rem;
  text-align: center; padding: 8px 0;
}

/* === ICON GRID === */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  width: 100%;
  max-width: 300px;
}
.icon-grid button {
  width: 80px; height: 80px;
  border-radius: 20px;
  border: 2px solid var(--purple);
  background: var(--white);
  font-size: 2.2rem;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-grid button:hover {
  transform: scale(1.08);
  box-shadow: var(--shadow);
  border-color: var(--pink);
}
.icon-grid button.selected {
  border-color: var(--pink);
  background: #FFF0F3;
  animation: bounce 0.4s ease;
}
.btn-confirm {
  background: var(--coral);
  color: var(--white);
  border: none;
  border-radius: 50px;
  padding: 14px 36px;
  font-size: 1.1rem;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  animation: popIn 0.3s ease;
  transition: transform 0.2s;
}
.btn-confirm:active { transform: scale(0.95); }
.custom-input-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 280px;
  animation: popIn 0.3s ease;
}
.custom-input-area input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: 2px solid var(--purple);
  font-family: var(--font);
  font-size: 1rem;
  text-align: center;
  background: var(--white);
}
.custom-input-area input:focus {
  outline: none;
  border-color: var(--pink);
}

/* === DATE CARD (Redesigned) === */
.date-card {
  background: var(--white);
  border-radius: 24px;
  padding: 0;
  box-shadow: 0 12px 48px rgba(255, 107, 138, 0.18), 0 2px 8px rgba(0,0,0,0.04);
  width: 100%;
  max-width: 340px;
  animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
}
.date-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--pink), var(--coral), #F8B4C8, var(--purple));
  z-index: 2;
}
.card-header {
  background: linear-gradient(135deg, #FFF0F3 0%, #FFF5F0 50%, #F8F0FF 100%);
  padding: 24px 20px 18px;
  text-align: center;
  position: relative;
}
.card-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 3px;
  border-radius: 2px;
  background: var(--pink);
  opacity: 0.3;
}
.card-title-icon {
  font-size: 2.4rem;
  display: block;
  margin-bottom: 6px;
  animation: float 3s ease-in-out infinite;
}
.card-title-gif {
  width: 80px;
  height: 80px;
  object-fit: contain;
  display: block;
  margin: 0 auto 6px;
  border-radius: 16px;
  background: none;
  mix-blend-mode: multiply;
}
.card-title-text {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--pink);
  letter-spacing: -0.3px;
}
.card-body {
  padding: 20px 24px 24px;
}
.card-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(232,213,245,0.5);
}
.card-row:last-of-type { border-bottom: none; }
.card-icon-wrap {
  width: 48px; height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #FFF0F3, #FFF5F0);
  border-radius: 14px;
  font-size: 1.5rem;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(255,107,138,0.08);
}
.card-info { flex: 1; min-width: 0; }
.card-label {
  font-weight: 600;
  font-size: 0.7rem;
  color: var(--coral);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 2px;
}
.card-value {
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
  line-height: 1.3;
  word-break: break-word;
}
.card-footer {
  padding: 16px 24px 20px;
  text-align: center;
  background: linear-gradient(180deg, transparent, #FFF0F3 60%);
}
.card-footer-text {
  font-weight: 800;
  font-size: 1.05rem;
  color: var(--pink);
  line-height: 1.5;
  letter-spacing: -0.2px;
}
.card-footer-hearts {
  font-size: 1.2rem;
  margin-top: 6px;
  animation: heartbeat 2s ease-in-out infinite;
  display: inline-block;
}
.card-decor {
  position: absolute;
  font-size: 3rem;
  opacity: 0.08;
  pointer-events: none;
  z-index: 1;
}
.card-decor.tl { top: -8px; left: -8px; animation: twinkle 3s ease-in-out infinite; }
.card-decor.br { bottom: -8px; right: -8px; animation: twinkle 3s ease-in-out 1.5s infinite; }

/* Mobile touch improvements */
@media (max-width: 414px) {
  .btn { padding: 16px 40px; font-size: 1.15rem; }
  .step-title { font-size: 1.6rem; }
  .icon-grid button { width: 72px; height: 72px; font-size: 2rem; }
}
.btn, .icon-grid button {
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; }
</style>
</head>
<body>

<!-- Background Audio -->
<audio id="bgMusic" src="Perfect.mp3" loop preload="auto" autoplay playsinline></audio>

<!-- Floating animated particles -->
<div class="floating-particles" id="floatingParticles"></div>

<!-- Music Toggle -->
<button class="music-toggle" id="musicToggle" onclick="toggleMusic()" aria-label="Toggle music">🎵</button>

<div class="app-container">

  <!-- Step 1: Initial Question -->
  <div id="step1" class="step active">
    <img src="1.gif" alt="cute love" class="step-gif heartbeat-anim">
    <h1 class="step-title">Do you want to date me?</h1>
    <div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;">
      <button class="btn btn-yes" onclick="goNext()">Yes</button>
      <button class="btn btn-no" id="btnNo">No</button>
    </div>
    <p class="hint-text">(No takes the stairs, sorry 💨)</p>
  </div>

  <!-- Step 2: Playful Rejection -->
  <div id="step2" class="step">
    <img src="2.gif" alt="cute smirk" class="step-gif wobble-anim">
    <h2 class="step-title">Well, I thought you would turn me down</h2>
    <button class="btn btn-next" onclick="setStep(3)">Next</button>
  </div>

  <!-- Step 3: Date/Time -->
  <div class="step" id="step3">
    <img src="3.gif" alt="cute calendar" class="step-gif float-anim">
    <h1 class="step-title">When are you free?</h1>
    <p class="step-subtitle">Pick a time</p>
    <button class="btn btn-yes" id="btnSelectDate">Select the date</button>
    <div class="selected-datetime-display" id="selectedDateTime" style="display:none;"></div>
    <button class="btn btn-next" id="btnStep3Next" style="display:none;" onclick="goNext()">Next</button>
    <div class="calendar-overlay" id="calendarOverlay">
      <div class="calendar-popup" id="calendarPopup">
        <div class="calendar-header">
          <button id="calPrev">&larr;</button>
          <span class="calendar-month" id="calMonthYear"></span>
          <button id="calNext">&rarr;</button>
        </div>
        <div class="calendar-weekdays">
          <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        </div>
        <div class="calendar-days" id="calDays"></div>
        <div class="time-selector">
          <select id="timeHour"></select>
          <span>:</span>
          <select id="timeMinute">
            <option>00</option><option>15</option><option>30</option><option>45</option>
          </select>
          <select id="timeAmPm">
            <option>AM</option><option>PM</option>
          </select>
        </div>
        <button class="calendar-confirm" id="calConfirm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Step 4: Food Selection -->
  <div id="step4" class="step">
    <img src="4.gif" alt="cute food" class="step-gif heartbeat-anim">
    <h2 class="step-title">What are we feeling?</h2>
    <div id="foodGrid"></div>
    <div id="foodConfirm" class="hidden"></div>
    <button class="btn btn-no" id="btnNotThese">Not these</button>
    <div id="customFoodInput" class="hidden"></div>
  </div>

  <!-- Step 5: Activity Selection -->
  <div id="step5" class="step">
    <div class="step-emoji wobble-anim">🎯</div>
    <h2 class="step-title">What's ur vibe?</h2>
    <div id="activityGrid"></div>
    <div id="activityConfirm" class="hidden"></div>
  </div>

  <!-- Step 6: Date Card -->
  <div id="step6" class="step">
    <div id="dateCard"></div>
  </div>

</div>

<script>
/* === FLOATING PARTICLES === */
(function createParticles() {
  const container = document.getElementById('floatingParticles');
  const emojis = ['💕','💖','✨','🩷','💗','🌸','💝','🫧','💫','🦋','🌷','💐'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('span');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.fontSize = (1 + Math.random() * 1.8) + 'rem';
    p.style.animationDuration = (8 + Math.random() * 14) + 's';
    p.style.animationDelay = Math.random() * 12 + 's';
    p.style.opacity = (0.15 + Math.random() * 0.25);
    container.appendChild(p);
  }
})();

/* === BACKGROUND MUSIC === */
let musicPlaying = false;
const bgMusic = document.getElementById('bgMusic');
const MUSIC_START_TIME = 8.5; // "I found a love..." starts here

// Start from the first lyric as soon as metadata loads
bgMusic.addEventListener('loadedmetadata', () => {
  bgMusic.currentTime = MUSIC_START_TIME;
  // Attempt autoplay immediately
  bgMusic.volume = 0.3;
  bgMusic.play().then(() => {
    musicPlaying = true;
    updateMusicIcon();
  }).catch(() => {
    // Autoplay blocked — wait for user gesture
  });
});

// Also try immediately in case metadata already loaded
if (bgMusic.readyState >= 1) {
  bgMusic.currentTime = MUSIC_START_TIME;
  bgMusic.volume = 0.3;
  bgMusic.play().then(() => {
    musicPlaying = true;
    updateMusicIcon();
  }).catch(() => {});
}

// Fallback: any interaction triggers play if not already playing
function resumeMusic() {
  if (bgMusic && !musicPlaying) {
    bgMusic.currentTime = MUSIC_START_TIME;
    bgMusic.volume = 0.3;
    bgMusic.play().then(() => {
      musicPlaying = true;
      updateMusicIcon();
    }).catch(() => {});
    document.removeEventListener('click', resumeMusic);
    document.removeEventListener('touchstart', resumeMusic);
  }
}
document.addEventListener('click', resumeMusic, { once: true });
document.addEventListener('touchstart', resumeMusic, { once: true });

// Loop back to first lyric instead of beginning of song
bgMusic.addEventListener('timeupdate', () => {
  // When nearing end, seek back to start time for seamless loop
  if (bgMusic.currentTime >= bgMusic.duration - 1) {
    bgMusic.currentTime = MUSIC_START_TIME;
  }
});

function toggleMusic() {
  if (!bgMusic) return;
  if (musicPlaying) {
    bgMusic.pause();
    musicPlaying = false;
  } else {
    bgMusic.currentTime = MUSIC_START_TIME;
    bgMusic.play();
    musicPlaying = true;
  }
  updateMusicIcon();
}

function updateMusicIcon() {
  const btn = document.getElementById('musicToggle');
  if (!btn) return;
  btn.textContent = musicPlaying ? '🎵' : '🔇';
  btn.classList.toggle('playing', musicPlaying);
}

/* === State Management === */
const state = {
  step: 1,
  dateTime: null,
  food: null,
  activity: null,
};

/* === Navigation === */
let _transitioning = false;
function setStep(n) {
  if (_transitioning) return;
  _transitioning = true;

  const current = document.querySelector(`#step${state.step}`);
  if (current) {
    current.style.animation = 'fadeSlideOut 0.3s ease forwards';
  }

  state.step = n;

  setTimeout(() => {
    if (current) {
      current.classList.remove('active');
      current.style.animation = '';
    }
    const next = document.querySelector(`#step${n}`);
    if (next) {
      next.classList.add('active');
      next.style.animation = 'none';
      next.offsetHeight;
      next.style.animation = 'fadeSlideIn 0.4s ease';
    }
    initStep(n);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    _transitioning = false;
  }, 300);
}

function goNext() {
  if (state.step < 6) setStep(state.step + 1);
}

/* === Step Init Stubs === */
function initStep1() {
  const btnNo = document.getElementById('btnNo');
  if (!btnNo) return;

  // Reset button to default flow position and restart wiggle
  btnNo.style.position = '';
  btnNo.style.left = '';
  btnNo.style.top = '';
  btnNo.style.zIndex = '';
  btnNo.style.transition = '';
  btnNo.style.animation = 'wiggle 0.5s ease infinite';

  // Guard against duplicate listener registration
  if (!btnNo._step1Initialized) {
    btnNo._step1Initialized = true;

    // Desktop: mouseenter triggers jump
    btnNo.addEventListener('mouseenter', evadeNo);

    // Mobile: touchstart triggers jump
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      evadeNo(e);
    });
  }
}

function evadeNo(e) {
  const btn = document.getElementById('btnNo');
  if (!btn) return;

  const btnWidth = btn.offsetWidth;
  const btnHeight = btn.offsetHeight;

  // Use full viewport since button is position:fixed
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const pointerX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
  const pointerY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);

  let x, y;
  const minDist = 80;
  let attempts = 0;

  do {
    x = Math.random() * (vw - btnWidth);
    y = Math.random() * (vh - btnHeight);
    const dist = Math.hypot(
      x + btnWidth / 2 - pointerX,
      y + btnHeight / 2 - pointerY
    );
    attempts++;
    if (dist >= minDist || attempts > 20) break;
  } while (true);

  // Clamp to keep button fully within viewport
  x = Math.max(0, Math.min(x, vw - btnWidth));
  y = Math.max(0, Math.min(y, vh - btnHeight));

  btn.style.position = 'fixed';
  btn.style.left = x + 'px';
  btn.style.top = y + 'px';
  btn.style.transition = 'left 0.2s ease, top 0.2s ease';
  btn.style.zIndex = '100';
}

// === CALENDAR STATE ===
let calDate = new Date();
let calSelectedDay = null;

function initStep3() {
  const btnSelect = document.getElementById('btnSelectDate');
  const overlay = document.getElementById('calendarOverlay');

  btnSelect.onclick = () => {
    calDate = new Date();
    calSelectedDay = null;
    renderCalendar();
    overlay.classList.add('show');
  };

  overlay.onclick = (e) => {
    if (e.target === overlay) overlay.classList.remove('show');
  };

  document.getElementById('calPrev').onclick = () => {
    calDate.setMonth(calDate.getMonth() - 1);
    renderCalendar();
  };

  document.getElementById('calNext').onclick = () => {
    calDate.setMonth(calDate.getMonth() + 1);
    renderCalendar();
  };

  // Time hour options
  const hourSel = document.getElementById('timeHour');
  hourSel.innerHTML = '';
  for (let h = 1; h <= 12; h++) {
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = h;
    hourSel.appendChild(opt);
  }

  document.getElementById('calConfirm').onclick = confirmDateTime;
  renderCalendar();
}

function renderCalendar() {
  const year = calDate.getFullYear();
  const month = calDate.getMonth();

  document.getElementById('calMonthYear').textContent =
    calDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const daysEl = document.getElementById('calDays');
  daysEl.innerHTML = '';

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // Previous month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const btn = document.createElement('button');
    btn.textContent = daysInPrevMonth - i;
    btn.classList.add('other-month');
    daysEl.appendChild(btn);
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const btn = document.createElement('button');
    btn.textContent = d;
    const thisDate = new Date(year, month, d);
    thisDate.setHours(0, 0, 0, 0);

    if (thisDate < today) {
      btn.disabled = true;
      btn.style.opacity = '0.3';
    }

    if (calSelectedDay && calSelectedDay.day === d && calSelectedDay.month === month && calSelectedDay.year === year) {
      btn.classList.add('selected');
    }

    btn.onclick = () => {
      calSelectedDay = { day: d, month: month, year: year };
      renderCalendar();
    };

    daysEl.appendChild(btn);
  }

  // Next month days
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    btn.classList.add('other-month');
    daysEl.appendChild(btn);
  }
}

function confirmDateTime() {
  if (!calSelectedDay) return;

  const sel = calSelectedDay;
  const selDate = new Date(sel.year, sel.month, sel.day);
  const month = selDate.toLocaleDateString('en-US', { month: 'long' });
  const day = sel.day;
  const year = sel.year;
  const hour = document.getElementById('timeHour').value;
  const minute = document.getElementById('timeMinute').value;
  const amPm = document.getElementById('timeAmPm').value;
  const timeStr = `${hour}:${minute} ${amPm}`;

  state.dateTime = `${month} ${day}, ${year} at ${timeStr}`;

  const display = document.getElementById('selectedDateTime');
  display.textContent = '📅 ' + state.dateTime;
  display.style.display = 'block';

  document.getElementById('btnStep3Next').style.display = 'block';
  document.getElementById('calendarOverlay').classList.remove('show');
}

const FOOD_ICONS = ['🍲', '🥩', '🍔', '🍕', '🥡', '🍜', '🍳'];
const ACTIVITY_ICONS = ['🎬', '🚶', '🎨', '🀄', '☕'];

function initStep4() {
  const grid = document.getElementById('foodGrid');
  grid.innerHTML = '';
  grid.className = 'icon-grid';

  FOOD_ICONS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.onclick = () => selectFood(emoji, btn);
    grid.appendChild(btn);
  });

  // Reset state
  document.getElementById('foodConfirm').classList.add('hidden');
  document.getElementById('foodConfirm').innerHTML = '';
  document.getElementById('customFoodInput').classList.add('hidden');
  document.getElementById('customFoodInput').innerHTML = '';
  document.getElementById('btnNotThese').style.display = 'block';

  // Not these button
  document.getElementById('btnNotThese').onclick = showCustomFoodInput;
}

function selectFood(emoji, btnEl) {
  // Clear all selected
  document.querySelectorAll('#foodGrid button').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');

  state.food = emoji;

  const confirmDiv = document.getElementById('foodConfirm');
  confirmDiv.innerHTML = '<button class="btn-confirm" onclick="goNext()">Emm, sounds yummy</button>';
  confirmDiv.classList.remove('hidden');
  confirmDiv.style.display = 'block';
}

function showCustomFoodInput() {
  document.getElementById('btnNotThese').style.display = 'none';
  const div = document.getElementById('customFoodInput');
  div.innerHTML = `
    <div class="custom-input-area">
      <p style="font-weight:600;color:var(--text);">Any idea?</p>
      <input type="text" id="customFood" placeholder="Type your craving...">
      <button class="btn-confirm" onclick="submitCustomFood()">I would like this</button>
    </div>
  `;
  div.classList.remove('hidden');
  div.style.display = 'block';
}

function submitCustomFood() {
  const input = document.getElementById('customFood');
  const val = input.value.trim();
  if (!val) return;
  state.food = val;
  goNext();
}

function initStep5() {
  const grid = document.getElementById('activityGrid');
  grid.innerHTML = '';
  grid.className = 'icon-grid';

  ACTIVITY_ICONS.forEach(emoji => {
    const btn = document.createElement('button');
    btn.textContent = emoji;
    btn.onclick = () => selectActivity(emoji, btn);
    grid.appendChild(btn);
  });

  document.getElementById('activityConfirm').classList.add('hidden');
  document.getElementById('activityConfirm').innerHTML = '';
}

function selectActivity(emoji, btnEl) {
  document.querySelectorAll('#activityGrid button').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');

  state.activity = emoji;

  const confirmDiv = document.getElementById('activityConfirm');
  confirmDiv.innerHTML = '<button class="btn-confirm" onclick="goNext()">Sounds like a plan</button>';
  confirmDiv.classList.remove('hidden');
  confirmDiv.style.display = 'block';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function initStep6() {
  const card = document.getElementById('dateCard');
  card.className = 'date-card';

  const dateDisplay = state.dateTime || 'Whenever you want 😌';
  const isFoodEmoji = state.food && state.food.length <= 4;
  const foodIcon = isFoodEmoji ? state.food : '🍽️';
  const foodDisplay = state.food || 'Something delicious';
  const activityIcon = state.activity || '🎯';
  const activityDisplay = state.activity || 'Something fun';

  card.innerHTML = `
    <div class="card-decor tl">💮</div>
    <div class="card-decor br">💮</div>
    <div class="card-header">
      <img src="6.gif" alt="love" class="card-title-gif">
      <span class="card-title-text">Your Date Card</span>
    </div>
    <div class="card-body">
      <div class="card-row">
        <div class="card-icon-wrap">📅</div>
        <div class="card-info">
          <div class="card-label">When</div>
          <div class="card-value">${escapeHtml(dateDisplay)}</div>
        </div>
      </div>
      <div class="card-row">
        <div class="card-icon-wrap">${escapeHtml(foodIcon)}</div>
        <div class="card-info">
          <div class="card-label">Food</div>
          <div class="card-value">${escapeHtml(foodDisplay)}</div>
        </div>
      </div>
      <div class="card-row">
        <div class="card-icon-wrap">${escapeHtml(activityIcon)}</div>
        <div class="card-info">
          <div class="card-label">Activity</div>
          <div class="card-value">${escapeHtml(activityDisplay)}</div>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <div class="card-footer-text">I got you girl,<br>no backing out now</div>
      <span class="card-footer-hearts">💕</span>
    </div>
  `;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function initStep(n) {
  const initFns = { 1: initStep1, 3: initStep3, 4: initStep4, 5: initStep5, 6: initStep6 };
  if (initFns[n]) initFns[n]();
}

/* === Initialize on DOM Load === */
document.addEventListener('DOMContentLoaded', () => { initStep(1); });
</script>
